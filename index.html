<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFS_DG 스마트 카메라</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="./logo.png">
    <link rel="icon" href="./logo.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { touch-action: none; overscroll-behavior: none; }
        #reader { width: 100% !important; height: 100% !important; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; background-color: #000; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        .shutter-flash { animation: flash 0.3s ease-out; }
        @keyframes flash { 0% { background-color: white; opacity: 1; } 100% { background-color: transparent; opacity: 0; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen w-full flex flex-col font-sans">

    <!-- 상단 헤더 -->
    <header class="bg-slate-800 text-white h-14 shrink-0 shadow-md relative z-10 flex justify-between items-center px-4">
        <div class="w-8"></div>
        <h1 class="text-lg font-bold text-center"><i class="fas fa-boxes mr-2"></i>NFS_DG 스마트 카메라</h1>
        <button onclick="toggleCamera()" class="w-8 h-8 flex items-center justify-center bg-slate-700 rounded-full hover:bg-slate-600 transition shadow" title="렌즈 순환">
            <i class="fas fa-sync-alt"></i>
        </button>
    </header>

    <main class="flex-1 w-full flex flex-col items-center justify-start relative p-2 md:p-4 overflow-y-auto">
        
        <!-- ================= [STEP 1] 바코드 스캔 ================= -->
        <div id="step1-scanner" class="w-full max-w-md bg-white rounded-xl shadow-lg flex flex-col transition-all duration-300 mx-auto my-2 md:my-4">
            <div class="bg-blue-600 p-2 text-white flex justify-between items-center shrink-0 rounded-t-xl">
                <div class="font-bold whitespace-nowrap text-sm"><i class="fas fa-barcode mr-2"></i>스캔 단계</div>
                <button id="skip-scan-btn" onclick="skipScannerAndEnterManually()" class="bg-blue-800 hover:bg-blue-900 text-blue-100 text-xs py-1.5 px-3 rounded-full border border-blue-500 shadow-sm transition flex items-center">
                    <i class="fas fa-forward mr-1.5"></i> 스킵 (수동입력)
                </button>
            </div>
            
            <!-- 새로 추가된 접두어 설정 영역 -->
            <div class="bg-indigo-50 px-3 py-2 border-b border-indigo-100 flex items-center justify-between text-sm shrink-0 z-10">
                <label for="prefix-input" class="text-indigo-800 font-bold mr-2 whitespace-nowrap"><i class="fas fa-tag mr-1"></i>기본 접두어</label>
                <input type="text" id="prefix-input" class="w-32 bg-white border border-indigo-200 rounded px-2 py-1 text-indigo-900 font-mono text-center outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all uppercase shadow-inner" value="2026-D-" oninput="updatePrefixSetting()">
            </div>
            
            <div class="w-full shrink-0 bg-black relative flex items-center justify-center overflow-hidden" style="height: 50vh;" onclick="manualRefocus(this)">
                <div id="reader" class="w-full h-full"></div>
            </div>
            
            <div class="p-3 flex flex-col justify-center gap-2 bg-gray-50 border-t border-gray-200 rounded-b-xl">
                <!-- AI 분석 상태를 보여줄 텍스트 창 -->
                <p id="scanner-status" class="text-blue-600 mb-1 font-bold text-center text-sm transition-colors duration-300">카메라를 준비하는 중입니다...</p>
                <button id="start-scan-btn" onclick="startBarcodeScanner()" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full transition duration-300 shadow-md text-sm">
                    <i class="fas fa-play mr-2"></i> 스캐너 수동 켜기
                </button>
            </div>
        </div>

        <!-- ================= [STEP 2] 사진 촬영 ================= -->
        <div id="step2-camera" class="w-full max-w-md bg-white rounded-xl shadow-lg flex flex-col hidden transition-all duration-300 mx-auto my-2 md:my-4">
            <div class="bg-green-600 p-2 text-white text-center shadow-md z-10 shrink-0 rounded-t-xl">
                <div class="flex justify-between items-center mb-1 px-2">
                    <span class="text-xs opacity-90">현재 바코드</span>
                    <span class="text-[10px] text-green-200">터치하여 수정</span>
                </div>
                <div class="flex flex-col items-center gap-1.5">
                    <div class="flex items-center justify-between bg-green-700 rounded-lg px-2 py-1 border border-green-500 focus-within:border-white transition-all w-[90%] max-w-[16rem]">
                        <label for="current-barcode-input" class="cursor-pointer shrink-0"><i class="fas fa-pen text-green-400 mr-2 text-sm"></i></label>
                        <input type="text" id="current-barcode-input" inputmode="text" class="bg-transparent text-xl font-mono font-bold tracking-wider text-center text-white outline-none w-full" value="123456" oninput="updateBarcodeFromInput()">
                        <button onclick="clearBarcodeInput()" class="shrink-0 text-green-300 hover:text-white transition-colors ml-2 p-1 focus:outline-none" title="전체 지우기">
                            <i class="fas fa-times-circle text-lg"></i>
                        </button>
                    </div>
                    <button onclick="addPrefixText()" class="bg-green-800 hover:bg-green-900 text-green-100 text-[10px] py-1 px-3 rounded-full border border-green-500 shadow-sm transition flex items-center">
                        <i class="fas fa-keyboard mr-1.5"></i> '<span id="quick-prefix-display">2026-D-</span>' 빠른 입력
                    </button>
                </div>
            </div>

            <div class="w-full bg-gray-900 flex items-center justify-center p-2 relative" onclick="manualRefocus(this)">
                <!-- 3:2 가로형 뷰포트 -->
                <div class="relative flex items-center justify-center overflow-hidden rounded-lg shadow-inner bg-black w-full" style="aspect-ratio: 3/2;">
                    <video id="photo-video" class="w-full h-full object-cover" autoplay playsinline muted></video>
                    <div id="flash-effect" class="absolute inset-0 pointer-events-none opacity-0 rounded-lg"></div>
                    <div id="thumbnail-container" class="absolute bottom-2 right-2 border-2 border-white rounded shadow-lg hidden bg-white">
                        <img id="last-photo-thumb" class="w-12 h-12 object-cover" />
                        <div id="photo-count-badge" class="absolute -top-2 -left-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">1</div>
                    </div>
                </div>
            </div>

            <div class="p-3 shrink-0 flex flex-col gap-2 bg-gray-50 border-t border-gray-200 rounded-b-xl">
                <!-- 파일명 미리보기에 6자리 랜덤 키 표시 -->
                <p class="text-center text-[11px] text-gray-500 mb-1 break-all px-2">
                    저장 파일명: <span class="font-bold text-gray-800 inline-block" id="preview-filename">바코드_001_A1B2C3.jpg</span>
                </p>
                <button onclick="takePhoto()" class="bg-red-500 hover:bg-red-600 text-white font-bold rounded-full w-16 h-16 mx-auto flex items-center justify-center transition duration-300 shadow-xl border-4 border-red-200">
                    <i class="fas fa-camera text-2xl"></i>
                </button>
                <button onclick="resetToScanner()" class="mt-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 px-6 rounded-lg w-full transition duration-300 text-sm">
                    <i class="fas fa-undo mr-2"></i> 다른 바코드 스캔 (초기화)
                </button>
            </div>
        </div>
        <canvas id="capture-canvas" class="hidden"></canvas>
    </main>

    <script>
        // 6자리 랜덤 키 생성 함수 (알파벳 대문자 + 숫자)
        function generateRandomKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        let currentPrefix = "2026-D-"; 
        let html5QrCode = null; let currentBarcodeText = ""; let photoCounter = 1; 
        let currentRandomKey = generateRandomKey(); // 미리 부여해두기
        let cameraStream = null; let isScannerActive = false;
        
        let cameraDevices = []; 
        let currentDeviceIndex = 0; 
        let scanBuffer = [];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.error(err)); });
        }
        
        window.addEventListener('load', () => { 
            const savedPrefix = localStorage.getItem('nfs_dg_prefix');
            if (savedPrefix !== null) {
                currentPrefix = savedPrefix;
                document.getElementById('prefix-input').value = currentPrefix;
                document.getElementById('quick-prefix-display').innerText = currentPrefix;
            }
            setTimeout(() => { startBarcodeScanner(); }, 300); 
        });

        async function loadCameraDevices() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true});
                const devices = await navigator.mediaDevices.enumerateDevices();
                cameraDevices = devices.filter(d => d.kind === 'videoinput');
                stream.getTracks().forEach(track => track.stop());
                
                if(cameraDevices.length > 0) {
                    const savedCameraId = localStorage.getItem('nfs_dg_preferred_camera');
                    let bestIndex = -1;
                    if (savedCameraId) bestIndex = cameraDevices.findIndex(d => d.deviceId === savedCameraId);
                    if(bestIndex === -1) bestIndex = 0;
                    currentDeviceIndex = bestIndex;
                }
            } catch (e) { console.error("렌즈 목록 로드 실패:", e); }
        }

        function enhanceCameraFeatures(videoElement) {
            if (!videoElement || !videoElement.srcObject) return;
            try {
                const track = videoElement.srcObject.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                let advancedConstraints = {};
                if (capabilities.focusMode && capabilities.focusMode.includes("continuous")) advancedConstraints.focusMode = "continuous";
                if (capabilities.zoom) advancedConstraints.zoom = capabilities.zoom.min || 1.0;
                track.applyConstraints({ advanced: [advancedConstraints] }).catch(e=>console.log(e));
            } catch(e) { console.log(e); }
        }

        function manualRefocus(containerElement) {
            const videoElement = containerElement.querySelector('video');
            if(videoElement) {
                containerElement.style.opacity = '0.7';
                setTimeout(() => containerElement.style.opacity = '1', 150);
                enhanceCameraFeatures(videoElement);
            }
        }

        async function toggleCamera() {
            const btn = document.querySelector('button[title="렌즈 순환"]');
            if(btn.classList.contains('pointer-events-none')) return;
            btn.classList.add('opacity-50', 'pointer-events-none');
            btn.querySelector('i').classList.add('fa-spin');
            
            if (cameraDevices.length > 1) {
                currentDeviceIndex = (currentDeviceIndex + 1) % cameraDevices.length;
                localStorage.setItem('nfs_dg_preferred_camera', cameraDevices[currentDeviceIndex].deviceId);
            }
            
            let currentLensName = cameraDevices[currentDeviceIndex] ? cameraDevices[currentDeviceIndex].label : "다른 렌즈";
            const step1 = document.getElementById('step1-scanner');
            const step2 = document.getElementById('step2-camera');

            try {
                if (!step1.classList.contains('hidden') && html5QrCode && isScannerActive) {
                    document.getElementById('scanner-status').innerText = `[렌즈 저장됨: ${currentDeviceIndex}번] ${currentLensName}`;
                    await html5QrCode.stop(); html5QrCode.clear(); isScannerActive = false;
                    setTimeout(() => { startBarcodeScanner(); btn.classList.remove('opacity-50', 'pointer-events-none'); btn.querySelector('i').classList.remove('fa-spin'); }, 500);
                } else if (!step2.classList.contains('hidden') && cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop()); cameraStream = null;
                    setTimeout(() => { switchToCameraMode(); btn.classList.remove('opacity-50', 'pointer-events-none'); btn.querySelector('i').classList.remove('fa-spin'); }, 500);
                } else {
                    btn.classList.remove('opacity-50', 'pointer-events-none'); btn.querySelector('i').classList.remove('fa-spin');
                }
            } catch(err) { console.error(err); btn.classList.remove('opacity-50', 'pointer-events-none'); btn.querySelector('i').classList.remove('fa-spin'); }
        }

        async function startBarcodeScanner() {
            document.getElementById('start-scan-btn').classList.add('hidden');
            document.getElementById('scanner-status').innerText = "카메라를 켜고 바코드를 비춰주세요.";
            
            if (cameraDevices.length === 0) await loadCameraDevices();
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            
            scanBuffer = [];
            
            const config = { 
                fps: 30, 
                qrbox: { width: 250, height: 120 }, 
                disableFlip: false, 
                useBarCodeDetectorIfSupported: true,
                formatsToSupport: [Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.CODE_93, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.ITF]
            };
            
            let cameraConfig = (cameraDevices.length > 0 && cameraDevices[currentDeviceIndex].deviceId) ? cameraDevices[currentDeviceIndex].deviceId : { facingMode: "environment" };
            
            html5QrCode.start(cameraConfig, config, onBarcodeScanned, undefined)
            .then(() => { 
                isScannerActive = true; 
                setTimeout(() => { enhanceCameraFeatures(document.querySelector('#reader video')); }, 800);
            })
            .catch((err) => { 
                document.getElementById('start-scan-btn').classList.remove('hidden'); 
                document.getElementById('scanner-status').innerText = "오류 발생! 버튼을 눌러 스캐너를 켜주세요.";
            });
        }

        function onBarcodeScanned(decodedText) {
            let rawText = decodedText.trim().toUpperCase();
            let cleanedText = rawText.replace(/[*_]/g, ''); 
            
            let match = cleanedText.match(/([0-9OILSZB]+)$/);
            if (!match) return; 

            let dirtyNumbers = match[1];
            let pureNumbers = dirtyNumbers
                .replace(/[O]/g, '0')
                .replace(/[I|L]/g, '1')
                .replace(/[Z]/g, '2')
                .replace(/[S]/g, '5')
                .replace(/[B]/g, '8');

            let finalBarcode = currentPrefix + pureNumbers;

            scanBuffer.push(finalBarcode);
            if (scanBuffer.length > 10) scanBuffer.shift(); 
            
            let count = scanBuffer.filter(v => v === finalBarcode).length;

            if (count >= 3) {
                currentBarcodeText = finalBarcode; 
                photoCounter = 1;
                currentRandomKey = generateRandomKey(); // 새 바코드 읽었을 때 난수 초기화!
                scanBuffer = []; 
                try { navigator.vibrate(200); } catch(e){} 
                
                if (isScannerActive) {
                    html5QrCode.stop().then(() => { isScannerActive = false; html5QrCode.clear(); switchToCameraMode(); }).catch(() => { switchToCameraMode(); });
                } else { switchToCameraMode(); }
            } else {
                document.getElementById('scanner-status').innerText = `[AI 교정 및 검증중...] 🔍`;
            }
        }

        function skipScannerAndEnterManually() {
            if (isScannerActive && html5QrCode) {
                html5QrCode.stop().then(() => { isScannerActive = false; html5QrCode.clear(); proceedToManualEntry(); }).catch(() => { proceedToManualEntry(); });
            } else { proceedToManualEntry(); }
        }

        function proceedToManualEntry() {
            currentBarcodeText = "미입력"; 
            photoCounter = 1; 
            currentRandomKey = generateRandomKey(); // 수동입력 전환시 난수 초기화!
            switchToCameraMode();
            setTimeout(() => { const inputEl = document.getElementById('current-barcode-input'); inputEl.focus(); inputEl.select(); }, 500);
        }

        function switchToCameraMode() {
            document.getElementById('step1-scanner').classList.add('hidden');
            document.getElementById('step2-camera').classList.remove('hidden');
            document.getElementById('current-barcode-input').value = currentBarcodeText;
            updatePreviewFilename();
            
            const videoElement = document.getElementById('photo-video');
            let constraints = (cameraDevices.length > 0 && cameraDevices[currentDeviceIndex].deviceId) 
                ? { video: { deviceId: { exact: cameraDevices[currentDeviceIndex].deviceId }, width: { ideal: 1440 }, height: { ideal: 960 } } }
                : { video: { facingMode: "environment", width: { ideal: 1440 }, height: { ideal: 960 } } };
            
            navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => { 
                cameraStream = stream; 
                videoElement.srcObject = stream; 
                videoElement.onloadedmetadata = () => { enhanceCameraFeatures(videoElement); };
            })
            .catch(err => { alert("카메라 오류: " + err); resetToScanner(); });
        }

        function updateBarcodeFromInput() {
            const inputVal = document.getElementById('current-barcode-input').value.trim();
            currentBarcodeText = inputVal ? inputVal : "미입력";
            updatePreviewFilename();
        }
        
        function clearBarcodeInput() {
            const inputEl = document.getElementById('current-barcode-input');
            inputEl.value = ""; 
            currentBarcodeText = "미입력"; 
            photoCounter = 1; 
            currentRandomKey = generateRandomKey(); // 텍스트 초기화시 난수도 갱신!
            updatePreviewFilename(); 
            inputEl.focus(); 
        }
        
        function updatePrefixSetting() {
            const inputEl = document.getElementById('prefix-input');
            currentPrefix = inputEl.value.toUpperCase(); 
            localStorage.setItem('nfs_dg_prefix', currentPrefix); 
            document.getElementById('quick-prefix-display').innerText = currentPrefix; 
        }

        function addPrefixText() {
            const inputEl = document.getElementById('current-barcode-input');
            let currentVal = inputEl.value;
            
            if (currentVal === "미입력" || currentVal === "") {
                inputEl.value = currentPrefix;
            } else if (!currentVal.startsWith(currentPrefix)) {
                let numbersOnly = currentVal.replace(/[^0-9]/g, '');
                inputEl.value = currentPrefix + numbersOnly;
            }
            updateBarcodeFromInput(); inputEl.focus();
        }

        function updatePreviewFilename() {
            // 파일명 규칙: {바코드}_{일련번호}_{6자리난수}.jpg
            document.getElementById('preview-filename').innerText = `${currentBarcodeText}_${String(photoCounter).padStart(3, '0')}_${currentRandomKey}.jpg`;
        }

        function takePhoto() {
            if (!cameraStream) return;
            const video = document.getElementById('photo-video');
            const canvas = document.getElementById('capture-canvas');
            
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const targetAspect = 3 / 2; 
            
            let sx = 0, sy = 0, sWidth = vw, sHeight = vh;

            if (vw / vh > targetAspect) {
                sWidth = vh * targetAspect;
                sx = (vw - sWidth) / 2;
            } else {
                sHeight = vw / targetAspect;
                sy = (vh - sHeight) / 2;
            }

            canvas.width = sWidth;
            canvas.height = sHeight;
            const ctx = canvas.getContext('2d'); 
            ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

            const flash = document.getElementById('flash-effect');
            flash.classList.remove('shutter-flash'); void flash.offsetWidth; flash.classList.add('shutter-flash');

            document.getElementById('thumbnail-container').classList.remove('hidden');
            document.getElementById('last-photo-thumb').src = dataUrl;
            document.getElementById('photo-count-badge').innerText = photoCounter;

            // 저장 시 미리보기에 띄워둔 파일명(난수 포함)과 동일하게 다운로드!
            const fileName = `${currentBarcodeText}_${String(photoCounter).padStart(3, '0')}_${currentRandomKey}.jpg`;
            downloadImage(dataUrl, fileName);
            
            // 사진 찍은 후 다음 사진을 위해 카운터 올리고 난수 새로 생성
            photoCounter++; 
            currentRandomKey = generateRandomKey();
            updatePreviewFilename();
        }

        function downloadImage(dataUrl, filename) {
            const link = document.createElement('a'); link.href = dataUrl; link.download = filename;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function resetToScanner() {
            if (cameraStream) { cameraStream.getTracks().forEach(track => track.stop()); cameraStream = null; }
            document.getElementById('step2-camera').classList.add('hidden');
            document.getElementById('step1-scanner').classList.remove('hidden');
            document.getElementById('thumbnail-container').classList.add('hidden');
            document.getElementById('scanner-status').innerText = "카메라를 켜고 바코드를 비춰주세요.";
            
            scanBuffer = []; 
            currentBarcodeText = ""; 
            photoCounter = 1; 
            isScannerActive = false;
            currentRandomKey = generateRandomKey(); // 스캐너로 돌아가면 난수 초기화!
            
            setTimeout(() => { startBarcodeScanner(); }, 300);
        }
    </script>
</body>
</html>
